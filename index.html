<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAVE LINK 100</title>
    <style>
        :root {
            --bg: #0d1117;
            --text: #c9d1d9;
            --panel-border: #30363d;
            --accent: #58a6ff;
            --success: #238636;
            --success-border: #2ea44f;
            --error: #da3633;
            --daily: #ffbc42;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 16px;
            box-sizing: border-box;
            text-align: center;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        h1 { margin: 10px 0 0 0; font-size: 24px; letter-spacing: 2px; color: #fff; }
        
        /* タブバー (フレンドを削除) */
        .tab-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 20px 0;
        }
        .tab-btn {
            background: #21262d;
            color: #8b949e;
            border: 1px solid var(--panel-border);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .tab-btn.active {
            background: #30363d;
            color: #fff;
            border-color: #8b949e;
        }
        .tab-btn.daily-tab.active {
            border-color: var(--daily);
            color: var(--daily);
        }

        .stage-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .stage-btn {
            background: #21262d;
            color: #8b949e;
            border: 1px solid var(--panel-border);
            aspect-ratio: 1;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: not-allowed;
        }
        .stage-btn.unlocked { background: #30363d; color: #fff; cursor: pointer; }
        .stage-btn.cleared { background: var(--success); color: #fff; border-color: var(--success-border); cursor: pointer; }

        .daily-box {
            background: #161b22;
            border: 1px solid var(--daily);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        /* プレイ画面UI */
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
        .ink-badge { background: #30363d; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-family: monospace; }
        .ink-badge.perfect { background: var(--success); color: #fff; }
        .ink-badge.warning { background: var(--error); border-color: #ff6e67; }
        
        .target-box { background: #161b22; padding: 10px; border-radius: 10px; border: 1px solid var(--panel-border); margin-bottom: 12px; }
        .gradient-bar { height: 14px; border-radius: 7px; margin-top: 6px; }
        .canvas-wrapper { background: #161b22; border-radius: 12px; border: 1px solid var(--panel-border); overflow: hidden; margin-bottom: 12px; line-height: 0; }
        canvas { max-width: 100%; height: auto; }

        .rule-text { font-size: 12px; color: #8b949e; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: left; line-height: 1.5; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { background: #21262d; color: var(--text); border: 1px solid var(--panel-border); padding: 14px; font-size: 14px; font-weight: bold; border-radius: 10px; cursor: pointer; min-height: 44px; }
        
        .next-btn { background: linear-gradient(135deg, var(--success), var(--success-border)); color: #fff; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; display: none; width: 100%; min-height: 48px; }
        #msg { height: 24px; font-weight: bold; font-size: 15px; display: flex; align-items: center; justify-content: center; }
        #timer-display { font-family: monospace; font-weight: bold; color: #ff6e67; }
        
        /* 自分個人の記録用スタイル */
        .best-time-box { margin-top: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen" class="screen active">
        <div>
            <h1>WAVE LINK 100</h1>
            <p style="font-size: 13px; color: #8b949e; margin: 6px 0 0 0;">一筆書き色彩ルートパズル</p>
        </div>
        
        <div class="tab-bar">
            <button class="tab-btn active" id="mode-main-btn">メイン100</button>
            <button class="tab-btn daily-tab" id="mode-daily-btn">☀️ デイリー</button>
        </div>

        <div id="main-mode-view">
            <div class="stage-grid" id="stage-grid"></div>
        </div>

        <div id="daily-mode-view" style="display: none;">
            <div class="daily-box">
                <h3 style="margin:0 0 2px 0; color:var(--daily); font-size:15px;">本日の限定チャレンジ</h3>
                <p id="daily-date-text" style="font-size:11px; margin:0 0 8px 0; color:#8b949e;"></p>
                <button class="btn" id="start-daily-btn" style="background:var(--daily); color:#000; width:100%; font-size:15px; border:none; padding:10px; border-radius:8px;">本日のお題をプレイ</button>
                
                <div class="best-time-box">
                    ⏱️ 本日の自己ベストタイム: <strong id="my-best-display" style="color: var(--daily); font-family: monospace;">--.-s</strong>
                </div>
            </div>
        </div>
    </div>

    <div id="play-screen" class="screen">
        <div class="status-bar">
            <span id="level-title" style="font-weight: bold; color: #fff;">Lv.1</span>
            <div id="timer-box" style="display:none;">⏳ <span id="timer-display">0.0</span>s</div>
            <div>INK: <span id="ink-count" class="ink-badge">0 / 0</span></div>
        </div>
        
        <div class="target-box">
            <div style="font-size: 11px; color: #8b949e;">目指すグラデーション</div>
            <div id="target-gradient" class="gradient-bar"></div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvas" width="360" height="360"></canvas>
        </div>
        
        <div class="rule-text" id="dynamic-rule">
            💡 <strong>ルール：</strong>STARTからなぞって、INKをぴったり満タンにしてGOALへ！
        </div>

        <div id="msg"></div>
        <button id="next-stage-btn" class="next-btn">▶ 次のステージへ</button>

        <div class="btn-group">
            <button class="btn" id="reset-btn">🔁 全消し</button>
            <button class="btn" id="back-btn" style="background: #30363d;">🏠 もどる</button>
        </div>
    </div>
</div>

<script>
    // --- 1. 定数データ定義 ---
    const STAGE_DATA = {
        1: { size: 3, maxInk: 4, walls: [], costs: [] },
        2: { size: 3, maxInk: 6, walls: [], costs: [] },
        3: { size: 4, maxInk: 6, walls: [[1,1]], costs: [] },
        4: { size: 4, maxInk: 8, walls: [[1,2], [2,1]], costs: [] },
        5: { size: 4, maxInk: 7, walls: [], costs: [[1,1], [2,2]] }
    };

    // --- 2. DOM要素の取得・変数設定 ---
    const homeScreen = document.getElementById('home-screen');
    const playScreen = document.getElementById('play-screen');
    const stageGrid = document.getElementById('stage-grid');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const levelTitle = document.getElementById('level-title');
    const inkCount = document.getElementById('ink-count');
    const targetGradient = document.getElementById('target-gradient');
    const msgEl = document.getElementById('msg');
    const resetBtn = document.getElementById('reset-btn');
    const backBtn = document.getElementById('back-btn');
    const nextStageBtn = document.getElementById('next-stage-btn');
    const dynamicRule = document.getElementById('dynamic-rule');
    
    const modeMainBtn = document.getElementById('mode-main-btn');
    const modeDailyBtn = document.getElementById('mode-daily-btn');
    
    const mainModeView = document.getElementById('main-mode-view');
    const dailyModeView = document.getElementById('daily-mode-view');
    
    const dailyDateText = document.getElementById('daily-date-text');
    const startDailyBtn = document.getElementById('start-daily-btn');
    const timerBox = document.getElementById('timer-box');
    const timerDisplay = document.getElementById('timer-display');
    const myBestDisplay = document.getElementById('my-best-display');

    let currentLv = 1;
    let isDailyMode = false;
    let isDrawing = false;
    let isCleared = false;
    let path = [];
    
    let size = 4; 
    let cellS = 90;
    let grid = []; 
    let maxInk = 4;
    let requiredColors = [];

    let startTime = 0;
    let timerInterval = null;

    let clearedStages = JSON.parse(localStorage.getItem('wavelink_v11_progress')) || [];

    // --- 3. 自己ベストタイム表示更新 ---
    function updateBestTimeDisplay() {
        const myTime = localStorage.getItem('wl_my_daily_time');
        if (myTime) {
            myBestDisplay.innerText = `${parseFloat(myTime).toFixed(1)}s`;
        } else {
            myBestDisplay.innerText = '未挑戦';
        }
    }

    // --- 4. 画面・タブ管理 ---
    modeMainBtn.onclick = () => {
        modeMainBtn.classList.add('active'); modeDailyBtn.classList.remove('active');
        mainModeView.style.display = 'block'; dailyModeView.style.display = 'none';
    };
    modeDailyBtn.onclick = () => {
        modeDailyBtn.classList.add('active'); modeMainBtn.classList.remove('active');
        mainModeView.style.display = 'none'; dailyModeView.style.display = 'block';
        dailyDateText.innerText = getDailySeedAndLabel().label;
        updateBestTimeDisplay();
    };

    // --- 5. アルゴリズム・ステージ生成系 ---
    function hashRandom(seed, index = 0) {
        let h = (seed ^ index) + 0x9e3779b9;
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        h = (h ^ (h >>> 16)) >>> 0;
        return h / 4294967296;
    }

    function shuffleArray(array, seed) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(hashRandom(seed, i) * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function getDailySeedAndLabel() {
        const d = new Date();
        if (d.getHours() < 17) { d.setDate(d.getDate() - 1); }
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const date = String(d.getDate()).padStart(2, '0');
        return { seed: year * 10000 + (d.getMonth() + 1) * 100 + d.getDate(), label: `${year}/${month}/${date} 17:00 更新のお題` };
    }

    function createHome() {
        stageGrid.innerHTML = '';
        for(let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            btn.className = 'stage-btn';
            btn.innerText = i;
            const isUnlocked = (i === 1) || clearedStages.includes(i - 1);
            const isCleared = clearedStages.includes(i);
            if (isCleared) { btn.classList.add('cleared'); btn.onclick = () => startLevel(i); }
            else if (isUnlocked) { btn.classList.add('unlocked'); btn.onclick = () => startLevel(i); }
            else { btn.innerText = '🔒'; }
            stageGrid.appendChild(btn);
        }
    }

    function generateStage(lv, isDaily = false) {
        let seed = isDaily ? lv : lv * 777;
        if (!isDaily && STAGE_DATA[lv]) {
            const data = STAGE_DATA[lv];
            size = data.size; cellS = 360 / size; maxInk = data.maxInk;        dailyDateText.innerText = getDailySeedAndLabel().label;
        updateBestTimeDisplay();
    };

    // --- 5. アルゴリズム・ステージ生成系 ---
    function hashRandom(seed, index = 0) {
        let h = (seed ^ index) + 0x9e3779b9;
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        h = (h ^ (h >>> 16)) >>> 0;
        return h / 4294967296;
    }

    function shuffleArray(array, seed) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(hashRandom(seed, i) * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function getDailySeedAndLabel() {
        const d = new Date();
        if (d.getHours() < 17) { d.setDate(d.getDate() - 1); }
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const date = String(d.getDate()).padStart(2, '0');
        return { seed: year * 10000 + (d.getMonth() + 1) * 100 + d.getDate(), label: `${year}/${month}/${date} 17:00 更新のお題` };
    }

    function createHome() {
        stageGrid.innerHTML = '';
        for(let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            btn.className = 'stage-btn';
            btn.innerText = i;
            const isUnlocked = (i === 1) || clearedStages.includes(i - 1);
            const isCleared = clearedStages.includes(i);
            if (isCleared) { btn.classList.add('cleared'); btn.onclick = () => startLevel(i); }
            else if (isUnlocked) { btn.classList.add('unlocked'); btn.onclick = () => startLevel(i); }
            else { btn.innerText = '🔒'; }
            stageGrid.appendChild(btn);
        }
    }

    function generateStage(lv, isDaily = false) {
        let seed = isDaily ? lv : lv * 777;
        if (!isDaily && STAGE_DATA[lv]) {
            const data = STAGE_DATA[lv];
            size = data.size; cellS = 360 / size; maxInk = data.maxInk;
            grid = Array(size).fill().map(() => Array(size).fill('W'));
            grid[0][0] = 'S'; grid[size-1][size-1] = 'G';
            data.walls.forEach(([r, c]) => { if(grid[r]) grid[r][c] = 'X'; });
            data.costs.forEach(([r, c]) => { if(grid[r]) grid[r][c] = 'C'; });
        } else {
            if (isDaily) { size = 5; cellS = 72; }
            else if (lv <= 30) { size = 4; cellS = 90; }
            else if (lv <= 60) { size = 5; cellS = 72; }
            else { size = 6; cellS = 60; }

            grid = Array(size).fill().map(() => Array(size).fill('W'));
            grid[0][0] = 'S'; grid[size-1][size-1] = 'G';

            let emptyCells = [];
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    if((r<=1 && c<=1) || (r>=size-2 && c>=size-2)) continue;
                    emptyCells.push({r, c});
                }
            }
            emptyCells = shuffleArray(emptyCells, seed);
            let totalGimmicks = isDaily ? 4 : (lv <= 40 ? 2 : (lv <= 89 ? 4 : 6));
            let rIndex = 0;
            for(let i=0; i<totalGimmicks && rIndex < emptyCells.length; i++) {
                let cell = emptyCells[rIndex++];
                let randType = hashRandom(seed, i);
                if (isDaily || lv >= 90) {
                    if (randType < 0.6) { grid[cell.r][cell.c] = 'C'; }
                    else { grid[cell.r][cell.c] = 'X'; }
                } else {
                    if (lv >= 20 && randType < 0.55) { grid[cell.r][cell.c] = 'C'; }
                    else if (lv >= 5) { grid[cell.r][cell.c] = 'X'; }
                }
            }

            let validPaths = [];
            let baseDirs = [[0,1], [1,0], [0,-1], [-1,0]];
            let shuffledDirs = shuffleArray([...baseDirs], seed * 2);

            function findPaths(r, c, currentPath, currentCost) {
                if (grid[r][c] === 'G') { validPaths.push({ path: [...currentPath], cost: currentCost }); return; }
                if (validPaths.length > 20) return;
                for (let [dr, dc] of shuffledDirs) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
                        let tile = grid[nr][nc];
                        if (tile === 'X' || currentPath.some(p => p.r === nr && p.c === nc)) continue;
                        let nextPath = [...currentPath, {r: nr, c: nc}];
                        let stepCost = (tile === 'C' ? 2 : 1);
                        findPaths(nr, nc, nextPath, currentCost + stepCost);
                    }
                }
            }
            findPaths(0, 0, [{r: 0, c: 0}], 0);

            if (validPaths.length > 0) {
                let pathIdx = Math.floor(hashRandom(seed, 8) * validPaths.length);
                maxInk = validPaths[pathIdx].cost; 
            } else {
                grid = Array(size).fill().map(() => Array(size).fill('W'));
                grid[0][0] = 'S'; grid[size-1][size-1] = 'G';
                maxInk = size * 2 - 2;
            }
        }

        requiredColors = (lv > 50 || isDaily) ? ['#ff0000', '#ffaa00', '#00ff00'] : ['#ff0000', '#ff00ff', '#0000ff'];
        targetGradient.style.background = `linear-gradient(to right, ${requiredColors.join(',')})`;
        dynamicRule.innerHTML = isDaily ? `🌟 <strong>デイリーモード：</strong>今日のタイムアタックに挑戦！` : `💡 <strong>ルール：</strong>INKをぴったりにしてGOALへ！`;
    }

    // --- 6. ゲームコアロジック＆描画 ---
    function calculateCurrentInk() {
        if (path.length <= 1) return 0;
        let cost = 0;
        for (let i = 1; i < path.length; i++) {
            if (Math.abs(path[i-1].r - path[i].r) + Math.abs(path[i-1].c - path[i].c) > 1) continue;
            cost += (grid[path[i].r][path[i].c] === 'C' ? 2 : 1);
        }
        return cost;
    }

    function getBlendColor(step, total) {
        if (total <= 1) return requiredColors[0];
        let pct = step / (total - 1);
        if (pct <= 0.5) return blendHex(requiredColors[0], requiredColors[1], pct * 2);
        return blendHex(requiredColors[1], requiredColors[2], (pct - 0.5) * 2);
    }

    function blendHex(c1, c2, pct) {
        let r1 = parseInt(c1.substring(1,3), 16), g1 = parseInt(c1.substring(3,5), 16), b1 = parseInt(c1.substring(5,7), 16);
        let r2 = parseInt(c2.substring(1,3), 16), g2 = parseInt(c2.substring(3,5), 16), b2 = parseInt(c2.substring(5,7), 16);
        let r = Math.floor(r1 + (r2 - r1) * pct).toString(16).padStart(2, '0');
        let g = Math.floor(g1 + (g2 - g1) * pct).toString(16).padStart(2, '0');
        let b = Math.floor(b1 + (b2 - b1) * pct).toString(16).padStart(2, '0');
        return `#${r}${g}${b}`;
    }

    function startLevel(lv, isDaily = false) {
        currentLv = lv; isDailyMode = isDaily;
        homeScreen.classList.remove('active'); playScreen.classList.add('active');
        levelTitle.innerText = isDailyMode ? `デイリーチャレンジ` : `Lv. ${lv}`;
        isCleared = false; isDrawing = false; path = []; msgEl.innerText = ''; nextStageBtn.style.display = 'none';

        if (isDailyMode) {
            timerBox.style.display = 'block'; startTime = Date.now();
            timerInterval = setInterval(() => { timerDisplay.innerText = ((Date.now() - startTime) / 1000).toFixed(1); }, 100);
        } else { timerBox.style.display = 'none'; if(timerInterval) clearInterval(timerInterval); }

        generateStage(lv, isDailyMode); updateInkBadge(); draw();
    }

    function updateInkBadge() {
        const currentLength = calculateCurrentInk();
        inkCount.innerText = `${currentLength} / ${maxInk}`;
        inkCount.className = `ink-badge ${currentLength === maxInk ? 'perfect' : (currentLength > maxInk ? 'warning' : '')}`;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                const x = c * cellS + cellS / 2, y = r * cellS + cellS / 2, type = grid[r][c];
                ctx.beginPath();
                if (type === 'S') { ctx.fillStyle = requiredColors[0]; ctx.arc(x, y, cellS*0.24, 0, Math.PI * 2); ctx.fill(); }
                else if (type === 'G') { ctx.fillStyle = requiredColors[2]; ctx.arc(x, y, cellS*0.24, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
                else if (type === 'X') { ctx.fillStyle = '#21262d'; ctx.fillRect(c*cellS + cellS*0.1, r*cellS + cellS*0.1, cellS*0.8, cellS*0.8); ctx.strokeStyle = '#f85149'; ctx.lineWidth = 2; ctx.strokeRect(c*cellS + cellS*0.1, r*cellS + cellS*0.1, cellS*0.8, cellS*0.8); }
                else if (type === 'C') { ctx.fillStyle = '#e67e22'; ctx.fillRect(c*cellS + cellS*0.25, r*cellS + cellS*0.25, cellS*0.5, cellS*0.5); }
                else { ctx.fillStyle = '#30363d'; ctx.arc(x, y, Math.max(5, cellS*0.07), 0, Math.PI * 2); ctx.fill(); }

                ctx.fillStyle = '#8b949e'; ctx.font = `bold ${Math.max(10, cellS*0.14)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (type === 'S') { ctx.fillStyle = '#fff'; ctx.fillText('START', x, y); }
                if (type === 'G') { ctx.fillStyle = '#fff'; ctx.fillText('GOAL', x, y); }
                if (type === 'C') { ctx.fillStyle = '#fff'; ctx.fillText('+2', x, y); }
            }
        }

        if (path.length > 0) {
            ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = cellS * 0.22;
            for (let i = 0; i < path.length - 1; i++) {
                if (Math.abs(path[i].r - path[i+1].r) + Math.abs(path[i].c - path[i+1].c) > 1) continue;
                const x1 = path[i].c * cellS + cellS / 2, y1 = path[i].r * cellS + cellS / 2;
                const x2 = path[i+1].c * cellS + cellS / 2, y2 = path[i+1].r * cellS + cellS / 2;
                const grad = ctx.createLinearGradient(x1, y1, x2, y2);
                grad.addColorStop(0, getBlendColor(i, path.length)); grad.addColorStop(1, getBlendColor(i + 1, path.length));
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.strokeStyle = grad; ctx.stroke();
            }
        }
    }

    // --- 7. タッチ・入力イベント判定 ---
    function getCanvasCoordinates(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
    }

    function getCellFromPos(x, y) {
        const c = Math.floor(x / cellS), r = Math.floor(y / cellS);
        return (r >= 0 && r < size && c >= 0 && c < size) ? { r, c } : null;
    }

    function startAction(e) {
        if (isCleared) return;
        if (e.touches) e.preventDefault();
        const pos = getCanvasCoordinates(e);
        const cell = getCellFromPos(pos.x, pos.y); if (!cell) return;
        if (path.length === 0 && grid[cell.r][cell.c] === 'S') { isDrawing = true; path = [cell]; msgEl.innerText = ''; updateInkBadge(); draw(); }
    }

    function moveAction(e) {
        if (!isDrawing || isCleared) return;
        if (e.touches) e.preventDefault();
        const pos = getCanvasCoordinates(e);
        const cell = getCellFromPos(pos.x, pos.y); if (!cell || grid[cell.r][cell.c] === 'X') return;
        const last = path[path.length - 1];

        if (path.length > 1 && cell.r === path[path.length - 2].r && cell.c === path[path.length - 2].c) {
            path.pop();
            updateInkBadge(); draw(); return;
        }

        if ((Math.abs(last.r - cell.r) + Math.abs(last.c - cell.c) === 1) && !path.some(p => p.r === cell.r && p.c === cell.c)) {
            path.push(cell);
            updateInkBadge(); draw();
            if (grid[path[path.length - 1].r][path[path.length - 1].c] === 'G') { isDrawing = false; checkClearStatus(); }
        }
    }

    function checkClearStatus() {
        const currentLength = calculateCurrentInk();
        if (currentLength === maxInk) {
            isCleared = true; msgEl.style.color = '#3fb950'; msgEl.innerText = '🎉 STAGE CLEAR!';
            
            if (isDailyMode) {
                clearInterval(timerInterval);
                const finalTime = ((Date.now() - startTime) / 1000).toFixed(1);
                msgEl.innerText = `⏱️ CLEAR! TIME: ${finalTime}s`;
                const prevBest = localStorage.getItem('wl_my_daily_time');
                if(!prevBest || parseFloat(finalTime) < parseFloat(prevBest)){
                    localStorage.setItem('wl_my_daily_time', finalTime);
                }
            } else {
                if (!clearedStages.includes(currentLv)) { clearedStages.push(currentLv); localStorage.setItem('wavelink_v11_progress', JSON.stringify(clearedStages)); }
                if (currentLv < 100) nextStageBtn.style.display = 'block';
            }
        } else {
            msgEl.style.color = 'var(--error)'; msgEl.innerText = currentLength > maxInk ? '❌ インクが長すぎます！' : '❌ 長さが足りません！';
        }
    }

    // イベント登録
    canvas.addEventListener('mousedown', startAction);
    canvas.addEventListener('mousemove', moveAction);
    window.addEventListener('mouseup', () => isDrawing = false);

    canvas.addEventListener('touchstart', startAction, {passive: false});
    canvas.addEventListener('touchmove', moveAction, {passive: false});
    window.addEventListener('touchend', () => isDrawing = false);

    // 操作ボタン系
    resetBtn.onclick = () => { path = []; isCleared = false; isDrawing = false; msgEl.innerText = ''; nextStageBtn.style.display = 'none'; updateInkBadge(); draw(); };
    backBtn.onclick = () => { 
        if(timerInterval) clearInterval(timerInterval); 
        homeScreen.classList.add('active'); playScreen.classList.remove('active'); 
        createHome(); 
        if(isDailyMode) modeDailyBtn.click(); 
    };
    nextStageBtn.onclick = () => { if (currentLv < 100) startLevel(currentLv + 1); };
    startDailyBtn.onclick = () => { startLevel(getDailySeedAndLabel().seed, true); };

    // --- 8. アプリ起動初期化 ---
    createHome();
</script>
</body>
</html>
